<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#516255" />
  <title>Obrigado | OndeCortar.pt</title>
  <meta name="description" content="Obrigado. Recebemos o teu pedido e vamos responder assim que possível." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #efe4d1;
      --surface: rgba(251, 246, 238, 0.96);
      --text: #181410;
      --muted: #4e473d;
      --border: #cfbfa2;
      --accent: #425a47;
      --accent-strong: #2f4535;
    }
    body {
      margin: 0;
      font-family: "Plus Jakarta Sans", "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(166, 119, 45, 0.14), transparent 25%),
        radial-gradient(circle at top right, rgba(66, 90, 71, 0.12), transparent 28%),
        linear-gradient(180deg, #f5ecde 0%, var(--bg) 38%, #e5d6be 100%);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .box {
      width: min(680px, 100%);
      padding: 34px;
      border-radius: 26px;
      border: 1px solid var(--border);
      background: var(--surface);
      box-shadow: 0 24px 60px rgba(31, 25, 19, 0.09);
    }

    h1 {
      margin: 0 0 14px;
      font-size: clamp(2rem, 5vw, 3rem);
      line-height: 1.08;
    }

    p {
      color: var(--muted);
      line-height: 1.7;
      margin: 0 0 14px;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 22px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 13px 18px;
      border-radius: 14px;
      font-weight: 800;
      text-decoration: none;
      transition: transform 0.2s ease;
    }

    .btn:hover {
      transform: translateY(-2px);
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent-strong));
      color: #fff;
    }

    .btn-secondary {
      background: rgba(244, 235, 220, 0.96);
      border: 1px solid var(--border);
      color: var(--text);
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Obrigado.</h1>
    <p>Recebemos o teu pedido com sucesso.</p>
    <p>Vamos analisar a informação e responder assim que possível.</p>
    <div class="actions">
      <a class="btn btn-primary" href="index.html">Voltar ao início</a>
    </div>
  </div>
</body>
</html>
