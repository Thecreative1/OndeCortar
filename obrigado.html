<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#516255" />
  <title>Obrigado | OndeCortar.pt</title>
  <meta name="description" content="Obrigado. Recebemos o teu pedido e vamos responder assim que possível." />
  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(255, 196, 0, 0.14), transparent 25%),
        radial-gradient(circle at top right, rgba(230, 57, 70, 0.16), transparent 28%),
        linear-gradient(180deg, #0b0b0c 0%, #141415 100%);
      color: #f5f5f5;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .box {
      width: min(680px, 100%);
      padding: 34px;
      border-radius: 26px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(255, 255, 255, 0.05);
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.28);
    }

    h1 {
      margin: 0 0 14px;
      font-size: clamp(2rem, 5vw, 3rem);
      line-height: 1.08;
    }

    p {
      color: #c5c5c5;
      line-height: 1.7;
      margin: 0 0 14px;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 22px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 13px 18px;
      border-radius: 14px;
      font-weight: 800;
      text-decoration: none;
      transition: transform 0.2s ease;
    }

    .btn:hover {
      transform: translateY(-2px);
    }

    .btn-primary {
      background: linear-gradient(135deg, #e63946, #ff5d6a);
      color: white;
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: #f5f5f5;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Obrigado.</h1>
    <p>Recebemos o teu pedido com sucesso.</p>
    <p>Vamos analisar a informação e responder assim que possível.</p>
    <div class="actions">
      <a class="btn btn-primary" href="index.html">Voltar ao início</a>
    </div>
  </div>
</body>
</html>
