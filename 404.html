<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#516255" />
  <title>Página não encontrada | OndeCortar.pt</title>
  <meta name="robots" content="noindex,follow" />
  <link rel="icon" href="favicon.ico" type="image/x-icon" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #efe4d1;
      --surface: rgba(251, 246, 238, 0.96);
      --text: #181410;
      --muted: #4e473d;
      --border: #cfbfa2;
      --accent: #425a47;
      --accent-strong: #2f4535;
      --gold: #a6772d;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Plus Jakarta Sans", "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(166, 119, 45, 0.14), transparent 30%),
        radial-gradient(circle at top right, rgba(66, 90, 71, 0.12), transparent 26%),
        linear-gradient(180deg, #f5ecde 0%, var(--bg) 32%, #e7d8c0 100%);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .box {
      width: min(680px, 100%);
      padding: 40px;
      border-radius: 26px;
      border: 1px solid var(--border);
      background: var(--surface);
      box-shadow: 0 24px 60px rgba(31, 25, 19, 0.09);
      text-align: center;
    }
    .eyebrow {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 36px;
      padding: 8px 14px;
      border-radius: 999px;
      border: 1px solid rgba(215, 184, 130, 0.84);
      background: rgba(166, 119, 45, 0.14);
      color: var(--gold);
      font-size: 0.85rem;
      font-weight: 700;
      margin-bottom: 16px;
    }
    h1 {
      font-family: "Playfair Display", Georgia, serif;
      font-size: clamp(2.4rem, 6vw, 3.6rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      margin: 0 0 16px;
      line-height: 1.1;
    }
    p {
      color: var(--muted);
      line-height: 1.75;
      margin: 0 0 28px;
    }
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 13px 20px;
      border-radius: 14px;
      font-weight: 800;
      text-decoration: none;
      font-family: inherit;
      font-size: 1rem;
      transition: transform 0.2s ease;
    }
    .btn:hover { transform: translateY(-2px); }
    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent-strong));
      color: #fff;
      box-shadow: 0 14px 32px rgba(66, 90, 71, 0.22);
    }
    .btn-secondary {
      background: rgba(244, 235, 220, 0.96);
      border: 1px solid var(--border);
      color: var(--text);
    }
  </style>
</head>
<body>
  <div class="box">
    <span class="eyebrow">Erro 404</span>
    <h1>Página não encontrada</h1>
    <p>A página que procuras não existe ou foi movida. Usa os links abaixo para continuar.</p>
    <div class="actions">
      <a class="btn btn-primary" href="/">Explorar barbearias</a>
      <a class="btn btn-secondary" href="/loja/">Ir para a loja</a>
      <a class="btn btn-secondary" href="/revista/">Ver a revista</a>
    </div>
  </div>
</body>
</html>
