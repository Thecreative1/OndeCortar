<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Redirecionar produto | OndeCortar.pt</title>
  <meta name="robots" content="noindex,follow" />
  <link rel="canonical" href="https://ondecortar.pt/loja/" />
  <script>
    (function() {
      var params = new URLSearchParams(window.location.search);
      var slug = params.get("slug");
      if (slug) {
        window.location.replace("https://ondecortar.pt/produto/" + encodeURIComponent(slug) + "/");
      }
    })();
  </script>
</head>
<body>
  <p>Este link de produto mudou. <a id="produto-fallback" href="https://ondecortar.pt/loja/">Ir para a loja</a>.</p>
  <script>
    (function() {
      var params = new URLSearchParams(window.location.search);
      var slug = params.get("slug");
      if (!slug) return;
      var target = "https://ondecortar.pt/produto/" + encodeURIComponent(slug) + "/";
      var link = document.getElementById("produto-fallback");
      if (link) {
        link.href = target;
        link.textContent = target;
      }
    })();
  </script>
</body>
</html>
