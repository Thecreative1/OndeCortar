<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Redirecionar perfil | OndeCortar.pt</title>
  <meta name="robots" content="noindex,follow" />
  <link rel="canonical" href="https://ondecortar.pt/" />
  <link rel="alternate" hreflang="pt-PT" href="https://ondecortar.pt/" />
  <link rel="alternate" hreflang="x-default" href="https://ondecortar.pt/" />
  <script>
    (function() {
      var params = new URLSearchParams(window.location.search);
      var slug = params.get("slug");
      if (!slug) return;
      var target = "https://ondecortar.pt/barbearias/" + encodeURIComponent(slug) + "/";
      var canonical = document.querySelector('link[rel="canonical"]');
      if (canonical) canonical.setAttribute("href", target);
      window.location.replace(target);
    })();
  </script>
</head>
<body>
  <p>Este perfil mudou para uma URL limpa e indexável. <a id="perfil-fallback" href="https://ondecortar.pt/cidades/">Ver páginas locais</a>.</p>
  <script>
    (function() {
      var params = new URLSearchParams(window.location.search);
      var slug = params.get("slug");
      if (!slug) return;
      var target = "https://ondecortar.pt/barbearias/" + encodeURIComponent(slug) + "/";
      var link = document.getElementById("perfil-fallback");
      if (link) {
        link.href = target;
        link.textContent = target;
      }
    })();
  </script>
</body>
</html>
